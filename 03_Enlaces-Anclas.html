<!-- Los enlaces o anclas o hipervinculos -->
<!-- a (anchor) significa ancla. Metafora: Como en un barco, el ancla mantiene el barco en su lugar, un enlace mantiene al usuario en una ubicación específica o lo lleva a otra. -->

<!-- Los atributos son caracteristicas que definen el comportamiento y la apariencia de lo elementos en este caso el atributo href vuelve funcional a la etiqueta es por esta razon que se utiliza en el maquetado y no en el css dado que no es una caracteristica visual -->

<!-- href (hypertext reference) es la referencia a un recurso, es decir, el destino del enlace -->
<!-- Lo que esta adentro de la etiqueta a es el texto visible que el usuario vera en la pagina web. Mientras que lo que esta dentro de href es la referencia al recurso al que se quiere acceder. -->
 <h2 title="Titulo de la Pagina"> Enlaces o Anclas </h2>
 <!-- Por otra parte, el atributo title proporciona un texto de ayuda que se muestra cuando el usuario pasa el cursor sobre el enlace. Las tecnologias de de asistencia como lectores de pantalla utilizan este atributo para proporcionar información adicional al usuario. En el caso de personas invidentes esto les permite acceder a informacion adicional sobre el enlace. -->

 <a href="https://www.google.com">Google</a>
 <br>
 <a href="https://www.facebook.com">Facebook</a>
 <br>
 <a href="https://www.youtube.com">YouTube</a>
<br>
<a title="Ir al canal de youtube" href="https://www.youtube.com/@ramcrack0584">Ramcrack</a> <!-- Mala Practica: usar prtocolo relativo sin especificar el protocolo -->

<br>

<h2> Enlaces con target a otra ventana </h2>
<a href="03-4_pagina_enlace4.html" target="_blank">Ir a enlace cuatro en una nueva ventana</a>
<!-- El atributo target="_blank" abre el enlace en una nueva ventana o pestaña del navegador. Por defecto siempre esta en self que significa que se abre en la misma ventana -->
